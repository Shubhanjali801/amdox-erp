version: '3.9'

services:
  # ─── PostgreSQL 17 ────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: amdox_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: amdox_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - amdox_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d amdox_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: amdox_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - amdox_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes

  # ─── Keycloak (Auth/SSO) ──────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: amdox_keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: dev-mem
    networks:
      - amdox_network
    command: start-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Elasticsearch ────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: amdox_elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - amdox_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── pgAdmin (PostgreSQL UI) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: amdox_pgadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@amdox.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - amdox_network

  # ─── Redis Commander (Redis UI) ───────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: amdox_redis_ui
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - amdox_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  amdox_network:
    driver: bridge
