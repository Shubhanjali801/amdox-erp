name: Build — Docker Images

# Manual-only for now. Auto-push to Docker Hub is disabled until
# DOCKER_USERNAME / DOCKER_TOKEN secrets are configured in repo settings.
on:
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the image to verify the Dockerfile is valid.
      # push:false means no Docker Hub credentials are required.
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: amdox-erp-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: amdox-erp-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
