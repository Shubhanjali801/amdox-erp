name: CI — Lint & Test

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

jobs:
  lint-and-test-backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: amdox_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      # WIP project — lint/type-check/tests are advisory until the codebase stabilises.
      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Type check
        continue-on-error: true
        run: npm run type-check

      - name: Run unit tests
        continue-on-error: true
        run: npm run test:unit -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://admin:admin123@localhost:5432/amdox_test"
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_secret_for_ci_min32chars

      - name: Run integration tests
        continue-on-error: true
        run: npm run test:integration -- --passWithNoTests
        env:
          NODE_ENV: test
          
          DATABASE_URL: "postgresql://admin:admin123@localhost:5432/amdox_test"
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_secret_for_ci_min32chars

  lint-and-test-frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # WIP project — advisory until the codebase stabilises.
      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Type check
        continue-on-error: true
        run: npm run type-check

      - name: Run tests
        continue-on-error: true
        run: npm run test -- --passWithNoTests
