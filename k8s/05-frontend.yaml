# Frontend (Vite build served by nginx). Image built on the node + imported to k3s.
# VITE_API_BASE_URL is baked at build time as a RELATIVE path (/api/v1); the Traefik
# ingress routes /api → backend, so the same image works on any domain (see deploy-k3s.sh).
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: amdox
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: amdox
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: amdox-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
