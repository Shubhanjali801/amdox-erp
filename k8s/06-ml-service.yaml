# ML service (FastAPI + PyTorch). Heavy image — give it more memory.
# Optional: skip this file if your node is small; the app degrades gracefully.
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: amdox
spec:
  selector: { app: ml-service }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: amdox
spec:
  replicas: 1
  selector:
    matchLabels: { app: ml-service }
  template:
    metadata:
      labels: { app: ml-service }
    spec:
      containers:
        - name: ml-service
          image: amdox-ml:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "2Gi" }
