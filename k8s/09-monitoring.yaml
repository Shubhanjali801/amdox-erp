# Monitoring — NFR: API Latency (P95<300ms) + Availability.
# Prometheus scrapes the backend /metrics endpoint; Grafana visualises it.
# Minimal single-replica setup suitable for a demo cluster.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: amdox
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'amdox-backend'
        metrics_path: /metrics
        static_configs:
          - targets: ['backend:5000']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: amdox
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: amdox
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: amdox
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: amdox-secrets, key: POSTGRES_PASSWORD }
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: amdox
spec:
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
# To view dashboards: kubectl -n amdox port-forward svc/grafana 3000:3000
# Add Prometheus datasource → http://prometheus:9090 → import dashboard 1860 (Node) or build a panel on
# histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) for P95 latency.
